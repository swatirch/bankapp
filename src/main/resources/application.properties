# API Info
spring.application.name=Banking App

# Server
server.port=8080

# -------------------------------------------------------
# DATABASE — PostgreSQL (active when Docker is running)
# -------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/bankingdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=banking_user
spring.datasource.password=banking_pass

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# JWT
jwt.secret=banking-app-secret-key-must-be-at-least-256-bits-long
jwt.expiration=86400000


# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379