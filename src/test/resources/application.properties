spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hmac
jwt.expiration=86400000

# Redis — disabled for tests
spring.cache.type=none

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ── Kafka (Test) ─────────────────────────────────────────────────────────────

# This is the magic line — instead of connecting to real Kafka on localhost:9092
# Spring spins up an embedded in-memory Kafka just for tests
# ${spring.embedded.kafka.brokers} is automatically set by @EmbeddedKafka annotation
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}

# earliest = read from beginning of topic
# In tests we want to read ALL messages including ones sent before consumer started
spring.kafka.consumer.auto-offset-reset=earliest

# Same as main — trust our package for deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=com.banking.kafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}